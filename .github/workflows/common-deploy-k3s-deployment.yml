name: Deploy K3S Deployment

on:
  workflow_call:
    inputs:
      namespace:
        required: true
        type: string
      deployment_name:
        required: true
        type: string
      container_name:
        required: true
        type: string
      image_url:
        required: true
        type: string
    secrets:
      K3S_KUBE_CONFIG:
        required: true

jobs:
  deploy-k3s-deployment:
    runs-on: ubuntu-latest

    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set kubeconfig for K3S
        run: |
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.K3S_KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Check cluster access
        run: |
          kubectl get nodes

      - name: Image Update (Auto Restart)
        run: |
          kubectl set image -n ${{ inputs.namespace }} deployment/${{ inputs.deployment_name }} ${{ inputs.container_name }}=${{ inputs.image_url }}