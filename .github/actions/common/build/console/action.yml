name: Build Console Program
description: Console 프로그램 빌드하는 작업

inputs:
  work_dir:
    required: true
    description: 빌드할 working directory
  project_name:
    required: true
    description: 빌드할 프로젝트명
  target_framework:
    required: true
    description: 타겟 프레임워크
  dotnet_version:
    required: true
    description: .NET 버전
  artifact_name:
    required: true
    description: 압축 파일명
  build_env:
    required: false
    description: 빌드 환경(appsettings.{build_env}.json이 있을 때 적용)
  build_version:
    required: true
    description: 빌드 버전
  publish_dir:
    required: false
    default: publish
    description: output 경로
  build_configuration:
    required: false
    default: Release
    description: Build Configuration

runs:
  using: "composite"
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet_version }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore ${{ inputs.work_dir }}/${{ inputs.project_name }}/${{ inputs.project_name }}.csproj
      shell: pwsh

    - name: Publish Console project
      run: |
        dotnet publish ${{ inputs.work_dir }}/${{ inputs.project_name }}/${{ inputs.project_name }}.csproj `
          -c ${{ inputs.build_configuration }} `
          -f ${{ inputs.target_framework }} `
          -o ${{ inputs.publish_dir }} `
          --no-restore
      shell: pwsh

    - name: Apply appsettings
      run: |
        $publishDir = "${{ inputs.publish_dir }}"
        $environment = "${{ inputs.build_env }}"
        $source = Join-Path $publishDir "appsettings.$environment.json"
        $target = Join-Path $publishDir "appsettings.json"

        if (!(Test-Path $source)) {
          throw "appsettings file not found: $source"
        }

        Copy-Item $source $target -Force

        Get-ChildItem -Path $publishDir -Filter "appsettings.*.json" -File |
          Remove-Item -Force

        Write-Host "Applied appsettings.$environment.json to appsettings.json"
        Write-Host "Removed other appsettings.*.json files"
      shell: pwsh

    - name: Create version file
      run: |
        $publishDir = "${{ inputs.publish_dir }}"
        $versionFile = Join-Path $publishDir "version.txt"
        "${{ inputs.build_version }}" | Set-Content -Path $versionFile -Encoding UTF8
      shell: pwsh

    - name: Archive build output
      run: |
        Compress-Archive -Path ${{ inputs.publish_dir }}\* -DestinationPath ${{ inputs.publish_dir }}\${{ inputs.artifact_name }}
      shell: pwsh